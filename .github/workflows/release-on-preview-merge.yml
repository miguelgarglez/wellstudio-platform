name: Release On Preview Merge

on:
  pull_request:
    types:
      - closed
    branches:
      - main

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: release-on-preview-merge
  cancel-in-progress: false

jobs:
  release:
    if: >
      github.event.pull_request.merged == true &&
      github.event.pull_request.head.ref == 'preview'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Fetch tags
        run: git fetch --tags --force

      - name: Compute next release tag
        id: version
        shell: bash
        run: |
          latest_tag="$(git tag --list 'v*' --sort=-version:refname | head -n 1)"

          if [ -z "$latest_tag" ]; then
            next_tag="v0.1.0"
          else
            version="${latest_tag#v}"
            IFS='.' read -r major minor patch <<< "$version"
            next_patch=$((patch + 1))
            next_tag="v${major}.${minor}.${next_patch}"
          fi

          echo "latest_tag=$latest_tag" >> "$GITHUB_OUTPUT"
          echo "next_tag=$next_tag" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: actions/github-script@v7
        env:
          LATEST_TAG: ${{ steps.version.outputs.latest_tag }}
          NEXT_TAG: ${{ steps.version.outputs.next_tag }}
          TARGET_SHA: ${{ github.event.pull_request.merge_commit_sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const tag = process.env.NEXT_TAG;
            const targetSha = process.env.TARGET_SHA;
            const previousTag = process.env.LATEST_TAG;
            const prNumber = process.env.PR_NUMBER;

            try {
              await github.rest.repos.getReleaseByTag({
                owner,
                repo,
                tag,
              });
              core.notice(`Release ${tag} already exists. Skipping.`);
              return;
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
            }

            try {
              await github.rest.git.getRef({
                owner,
                repo,
                ref: `tags/${tag}`,
              });
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }

              await github.rest.git.createRef({
                owner,
                repo,
                ref: `refs/tags/${tag}`,
                sha: targetSha,
              });
            }

            const bodyLines = [
              `Release generated automatically after merging PR #${prNumber} from \`preview\` into \`main\`.`,
            ];

            if (previousTag) {
              bodyLines.push(`Previous release: \`${previousTag}\`.`);
            } else {
              bodyLines.push("Initial tracked release.");
            }

            await github.rest.repos.createRelease({
              owner,
              repo,
              tag_name: tag,
              target_commitish: targetSha,
              name: tag,
              body: bodyLines.join("\n\n"),
              generate_release_notes: true,
            });
