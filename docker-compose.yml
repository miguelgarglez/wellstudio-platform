services:
  db:
    image: postgres:17-alpine
    container_name: wellstudio-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: wellstudio
      POSTGRES_USER: wellstudio
      POSTGRES_PASSWORD: wellstudio
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U wellstudio -d wellstudio']
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wellstudio-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://wellstudio:wellstudio@db:5432/wellstudio
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-https://example.supabase.co}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-replace-me}
    ports:
      - '3000:3000'

volumes:
  postgres_data:
